<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Quiz | Diritto Amministrativo 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7345740458390832" crossorigin="anonymous"></script>
    <style>
        :root { --primary-blue: #0A2540; --action-red: #D93025; --bg-light: #F6F9FC; --text-dark: #333333; --success: #10B981; --error: #EF4444; --card-bg: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--primary-blue); color: white; padding: 1.5rem 1rem; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { font-size: 1.8rem; font-weight: 800; }
        .quiz-container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; flex-grow: 1; width: 100%; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 2rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-weight: 600; }
        .timer { display: flex; align-items: center; gap: 0.5rem; background: #E2E8F0; padding: 0.5rem 1rem; border-radius: 20px; font-variant-numeric: tabular-nums; }
        .progress-bar { width: 100%; height: 10px; background: #E2E8F0; border-radius: 5px; margin-bottom: 2rem; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-blue); width: 0%; transition: width 0.3s ease; }
        .question-text { font-size: 1.3rem; font-weight: 800; margin-bottom: 1.5rem; line-height: 1.4; }
        .options-grid { display: grid; gap: 0.8rem; }
        .option-btn { background: var(--bg-light); border: 2px solid #E2E8F0; padding: 0.8rem 1rem; border-radius: 8px; font-size: 1rem; text-align: left; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .option-btn:hover:not(:disabled) { border-color: var(--primary-blue); background: #E2E8F0; }
        .option-btn.correct { background-color: #D1FAE5 !important; border-color: var(--success) !important; color: #065F46 !important; }
        .option-btn.wrong { background-color: #FEE2E2 !important; border-color: var(--error) !important; color: #991B1B !important; }
        .feedback-box { margin-top: 1.2rem; padding: 1.2rem; border-radius: 8px; border: 2px solid transparent; display: none; }
        .feedback-box.show { display: block; animation: slideDown 0.3s ease; }
        .btn-primary { background: var(--action-red); color: white; border: none; padding: 1rem; font-size: 1.2rem; font-weight: 800; border-radius: 8px; cursor: pointer; display: block; width: 100%; text-align: center; text-decoration: none; margin-top: 1.5rem; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; background: var(--primary-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; margin: 0 auto 1.5rem; }
        .sales-pitch { background: #FFF4F2; border: 2px solid var(--action-red); padding: 1.5rem; border-radius: 12px; margin: 1.5rem 0; text-align: left; line-height: 1.5; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <header><h1>Simulatore Esame 2026</h1></header>
    <main class="quiz-container">
        <div id="start-screen" class="card" style="text-align: center;">
            <h2 style="margin-bottom: 1rem;">Protocollo di Selezione</h2>
            <p style="margin-bottom: 2rem; color: #666;">Questo non è un gioco. Solo il 5% dei candidati supera questa soglia di sbarramento psicologico. Sei pronto a guardare in faccia la realtà?</p>
            <button class="btn-primary" onclick="startQuiz()">MISURA IL TUO POTENZIALE ➔</button>
        </div>
        <div id="quiz-screen" class="card hidden">
            <div class="quiz-header"><span id="question-counter">Domanda 1/13</span><div class="timer">⏱️ <span id="time-display">00:00</span></div></div>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
            <h2 id="question-text" class="question-text"></h2>
            <div id="options-grid" class="options-grid"></div>
            <div id="feedback-box" class="feedback-box">
                <h4 id="feedback-title" style="margin-bottom: 0.5rem; font-weight: 800;"></h4>
                <div id="feedback-content"></div>
            </div>
            <button id="next-btn" class="btn-primary" style="display:none; background: var(--primary-blue);" onclick="nextQuestion()">CONTINUA IL TEST ➔</button>
        </div>
        <div id="result-screen" class="card hidden" style="text-align: center;">
            <h2>Verdetto Strategico</h2>
            <div class="score-circle" id="score-display">0%</div>
            <div id="sales-container"></div>
            <button class="btn-primary" style="background-color: var(--primary-blue); margin-top: 1rem;" onclick="location.reload()">🔄 TENTA NUOVAMENTE</button>
        </div>
    </main>

    <script>
        const databaseQuiz = [
            {"q": "Ai sensi dell'art. 10-bis L. 241/90, il preavviso di rigetto interrompe i termini di conclusione che:", "options": ["Riprendono a decorrere ex novo dalla presentazione delle osservazioni.", "Restano sospesi per un periodo massimo di 30 giorni lavorativi.", "Iniziano a decorrere nuovamente dalla comunicazione dei motivi ostativi.", "Iniziano a decorrere nuovamente per intero dieci giorni dopo la presentazione delle osservazioni."], "a": 3, "e": "Hai confuso l'interruzione con la sospensione. Un errore che al Formez non perdonano."},
            {"q": "Nel nuovo Codice dei Contratti (D.Lgs. 36/2023), la colpa grave dell'operatore pubblico è configurata:", "options": ["In ogni caso di violazione di norme di legge che determini un danno erariale.", "Nell'ipotesi di violazione di norme palesemente chiare, univoche e non suscettibili di interpretazione.", "Esclusivamente quando sussista il dolo specifico di favorire un operatore.", "Qualora la violazione derivi da un'errata interpretazione delle clausole del bando."], "a": 1, "e": "Il Principio di Fiducia tutela il funzionario salvo violazioni macroscopiche di norme chiare."},
            {"q": "Diritto UE: In caso di contrasto tra norma interna e norma UE senza effetti diretti, il giudice nazionale:", "options": ["Deve disapplicare immediatamente la norma interna per dare prevalenza alla UE.", "Deve sollevare questione di legittimità costituzionale dinanzi alla Consulta.", "Deve interpretare la norma interna in modo conforme e, se impossibile, sollevare rinvio pregiudiziale.", "È tenuto ad applicare la norma interna e segnalare la difformità al Governo."], "a": 2, "e": "L'assenza di effetti diretti obbliga all'interpretazione conforme, non alla disapplicazione."},
            {"q": "L'accesso civico generalizzato (FOIA) può essere rifiutato per 'conduzione di indagini sui reati'. Tale limite è:", "options": ["Un limite assoluto che preclude qualsiasi valutazione discrezionale.", "Sussistente solo se l'indagine è coperta dal segreto istruttorio penale.", "Un limite relativo che richiede un bilanciamento tra trasparenza e pregiudizio concreto.", "Destinato a decadere automaticamente trascorsi 180 giorni dalla richiesta."], "a": 2, "e": "I limiti FOIA richiedono un 'test di pregiudizio'. Non sono mai automatici."},
            {"q": "Logica: 'Non è falso che non tutti i verbali siano incompleti'. Qual è l'affermazione equivalente?", "options": ["Almeno un verbale è completo.", "Tutti i verbali sono completi.", "Almeno un verbale è incompleto.", "Nessun verbale è completo."], "a": 2, "e": "Senza padronanza della negazione dell'universale, la logica RIPAM ti distruggerà."},
            {"q": "Il soccorso istruttorio 'integrativo' (Art. 101 D.Lgs. 36/2023) permette di sanare i requisiti:", "options": ["Se effettivamente posseduti alla data di scadenza della presentazione dell'offerta.", "Entro 5 giorni lavorativi, previo pagamento di una sanzione pecuniaria.", "Purché l'integrazione non riguardi elementi essenziali dell'offerta tecnica o economica.", "Solo se la lex specialis di gara prevedeva espressamente tale facoltà."], "a": 0, "e": "Puoi sanare il documento, non creare il requisito dal nulla."},
            {"q": "Il silenzio-assenso tra amministrazioni pubbliche (Art. 17-bis L. 241/90) si perfeziona se:", "options": ["L'amministrazione non comunica l'assenso o il dissenso entro 30 giorni dal ricevimento.", "L'amministrazione procedente riceve nulla osta dagli organi di controllo interni.", "Sono trascorsi 60 giorni, se l'amministrazione gestisce interessi 'sensibili'.", "L'istanza è stata regolarmente protocollata presso la Presidenza del Consiglio."], "a": 0, "e": "La celerità è la regola: 30 giorni o è assenso."},
            {"q": "Il principio del 'Risultato' (Art. 1 D.Lgs. 36/2023) definisce la trasparenza come:", "options": ["Un valore etico assoluto cui il risultato economico deve essere subordinato.", "Uno strumento funzionale alla massima semplicità e celerità dell'attuazione.", "L'unico criterio oggettivo per la valutazione della responsabilità disciplinare.", "Un obbligo di pubblicazione integrale di ogni atto a pena di nullità dell'appalto."], "a": 1, "e": "La trasparenza non è più un fine, ma un mezzo per l'efficienza."},
            {"q": "La responsabilità disciplinare del dipendente per violazione del codice di comportamento:", "options": ["Comporta necessariamente la sospensione cautelare dal servizio per 30 giorni.", "Dà luogo a sanzioni graduate in base alla gravità, colpa e entità del danno.", "Determina l'automatica risoluzione del rapporto per regali sopra i 150 euro.", "È sanzionabile solo se accertata mediante sistemi di videosorveglianza."], "a": 1, "e": "Principio di proporzionalità della sanzione disciplinare."},
            {"q": "Una Direttiva UE 'non trasposta' può avere efficacia diretta verticale quando:", "options": ["Impone obblighi specifici ai cittadini verso la PA nazionale.", "Attribuisce ai singoli diritti precisi e incondizionati verso lo Stato.", "Sostituisce una norma nazionale dichiarata incostituzionale dalla Consulta.", "È pubblicata in GUUE da oltre 18 mesi senza ricevere osservazioni."], "a": 1, "e": "L'effetto diretto tutela il cittadino contro l'inerzia dello Stato."},
            {"q": "In caso di annullamento d'ufficio (art. 21-nonies), il termine di 12 mesi decorre:", "options": ["Dalla data di adozione formale del provvedimento viziato.", "Dal momento in cui l'amministrazione ha avuto conoscenza certa del vizio.", "Dalla scadenza del termine di conclusione del procedimento di riesame.", "Dalla data della notifica del provvedimento ai soggetti controinteressati."], "a": 0, "e": "Il tempo è perentorio: 12 mesi dall'adozione del provvedimento."},
            {"q": "Nella struttura del PIAO, la sezione 'Performance' integra i precedenti:", "options": ["Piani per la Prevenzione della Corruzione e della Trasparenza.", "Piano della Performance e Piano dei Fabbisogni del Personale.", "Documenti Tecnici di Accompagnamento al bilancio di previsione.", "Bilanci Sociali dell'Ente e Relazioni annuali dei nuclei di valutazione."], "a": 1, "e": "Il PIAO è l'unificatore dei piani organizzativi."},
            {"q": "Logica: 'Non è vero che se piove, allora non prendo l'ombrello'. Conclusione?", "options": ["Piove e ho preso l'ombrello.", "Non piove, ma ho preso l'ombrello per precauzione.", "Piove, ma non ho preso l'ombrello.", "Se non piove, è impossibile che io abbia preso l'ombrello."], "a": 0, "e": "Negazione dell'implicazione: l'unica via è piovere e prendere l'ombrello."},
            {"q": "Il principio di 'Fiducia' (D.Lgs. 36/2023) presume l'azione dei funzionari legittima:", "options": ["In via assoluta e insindacabile per evitare la burocrazia difensiva.", "Salvo dolo o colpa grave, valorizzando l'autonomia decisionale.", "Previa attestazione semestrale di regolarità tecnica del RUP.", "Solo per gli atti adottati sotto supervisione diretta dell'ANAC."], "a": 1, "e": "Si presume che il funzionario operi bene, a meno che non sia grossolano."},
            {"q": "In materia di rinvio pregiudiziale CGUE, i giudici di ultima istanza:", "options": ["Hanno la facoltà di sollevare la questione solo se c'è contrasto tra le parti.", "Hanno l'obbligo di sollevare la questione, salvo 'atto chiaro' o già deciso.", "Devono richiedere autorizzazione al CSM o al Ministero della Giustizia.", "Possono sollevare la questione solo per materie di competenza esclusiva UE."], "a": 1, "e": "L'obbligo di rinvio è il pilastro dell'uniformità UE."},
            {"q": "L'invalidità 'ad efficacia caducante' si manifesta quando l'atto presupposto:", "options": ["Travolge necessariamente l'atto consequenziale per nesso di stretta dipendenza.", "Richiede l'impugnazione autonoma dell'atto finale entro i termini.", "Viene pronunciato dall'amministrazione in sede di riesame straordinario.", "Riguarda esclusivamente vizi di forma che non incidono sul dispositivo."], "a": 0, "e": "Cade la base, cade tutto il castello di carte."},
            {"q": "Il 'subappalto a cascata' nel nuovo Codice Appalti è:", "options": ["Vietato categoricamente per prevenire infiltrazioni mafiose.", "Generalmente consentito, salvo divieto motivato nella lex specialis.", "Ammesso senza limiti solo per servizi intellettuali sotto soglia.", "Soggetto a previa autorizzazione dell'Ispettorato del Lavoro."], "a": 1, "e": "Nuova disciplina: ammesso ma con paletti precisi della Stazione Appaltante."},
            {"q": "La mancata emanazione del provvedimento nei termini (L. 241/90):", "options": ["Configura un'ipotesi di reato di omissione di atti d'ufficio.", "Rileva per la performance e costituisce responsabilità amministrativa.", "Determina l'annullabilità automatica del provvedimento tardivo.", "Comporta la decadenza immediata del dirigente dall'incarico."], "a": 1, "e": "Il ritardo è un costo: per la tua carriera e per l'ente."},
            {"q": "Logica: Qual è la negazione di 'Tutti i gatti sono neri'?", "options": ["Nessun gatto è nero.", "Tutti i gatti sono bianchi.", "Esiste almeno un gatto che non è nero.", "Alcuni gatti sono neri."], "a": 2, "e": "Per smentire tutti, basta trovarne uno diverso."},
            {"q": "Gli incarichi dirigenziali a soggetti esterni (D.Lgs. 165/2001) sono ammessi:", "options": ["Senza alcun limite, purché con esperienza almeno quinquennale.", "Entro limiti percentuali e per comprovata specializzazione professionale.", "Solo se l'amministrazione è in dissesto finanziario o commissariata.", "Per una durata massima di 12 mesi non prorogabili."], "a": 1, "e": "L'esterno è l'eccezione, non la regola. Limiti rigidi."}
        ];

        let quizSessione = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let timerInterval;
        let secondsElapsed = 0;

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            quizSessione = shuffle([...databaseQuiz]).slice(0, 13);
            score = 0; currentQuestionIndex = 0; secondsElapsed = 0;
            timerInterval = setInterval(() => {
                secondsElapsed++;
                const mins = String(Math.floor(secondsElapsed/60)).padStart(2,'0');
                const secs = String(secondsElapsed%60).padStart(2,'0');
                document.getElementById('time-display').innerText = mins + ":" + secs;
            }, 1000);
            loadQuestion();
        }

        function loadQuestion() {
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('feedback-box').className = 'feedback-box';
            document.getElementById('options-grid').innerHTML = '';
            const q = quizSessione[currentQuestionIndex];
            const correctText = q.options[q.a];
            
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('question-counter').innerText = "Domanda " + (currentQuestionIndex + 1) + "/13";
            document.getElementById('progress-fill').style.width = ((currentQuestionIndex)/13)*100 + "%";
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    const all = document.querySelectorAll('.option-btn');
                    all.forEach(b => {
                        b.disabled = true;
                        if(b.innerText === correctText) b.classList.add('correct');
                    });
                    
                    const fb = document.getElementById('feedback-box');
                    const ft = document.getElementById('feedback-title');
                    const fc = document.getElementById('feedback-content');
                    
                    if(opt === correctText) { 
                        score++; 
                        ft.innerText="✅ ANALISI CORRETTA"; 
                        ft.style.color = "#065F46";
                        fb.style.backgroundColor = '#D1FAE5'; 
                        fb.style.border = '2px solid #10B981';
                        fc.innerHTML = "<p style='color: #065F46;'>Hai dimostrato lucidità. Questa è la mentalità che serve per vincere.</p>";
                    } else { 
                        btn.classList.add('wrong'); 
                        ft.innerText="❌ ERRORE LETALE"; 
                        ft.style.color = "#D93025";
                        fb.style.backgroundColor = '#FEE2E2'; 
                        fb.style.border = '2px solid #EF4444';
                        fc.innerHTML = `
                            <p style="color: #991B1B; margin-bottom: 0.5rem;"><b>La risposta corretta era:</b> <span style="font-weight: 800;">${correctText}</span></p>
                            <p style="color: #991B1B; margin-bottom: 0.8rem;"><b>Perché hai sbagliato:</b> ${q.e}</p>
                            <p style="color: #666; font-size: 0.85rem; font-style: italic; border-top: 1px solid #F87171; padding-top: 0.5rem;">⚠️ Al concorso reale, questo errore ti avrebbe appena fatto perdere molte posizioni in graduatoria.</p>
                        `;
                    }
                    fb.classList.add('show');
                    document.getElementById('next-btn').style.display = 'block';
                };
                document.getElementById('options-grid').appendChild(btn);
            });
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if(currentQuestionIndex < 13) loadQuestion();
            else {
                clearInterval(timerInterval);
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                const perc = Math.round((score/13)*100);
                document.getElementById('score-display').innerText = perc + "%";
                const sc = document.getElementById('sales-container');
                if(perc < 80) {
                    document.getElementById('score-display').style.background = "var(--action-red)";
                    sc.innerHTML = `
                        <div class="sales-pitch">
                            <h3 style="color:var(--action-red);">⚠️ SEI FUORI: Il concorso non fa sconti</h3>
                            <p>La cruda realtà? Con questa preparazione, il tuo sogno del posto fisso svanisce al primo sbarramento. Il Formez non cerca i "bravi", cerca i perfetti.</p>
                            <p style="margin-top:1rem;">Hai assaggiato solo il 2% della cattiveria dei nuovi quiz 2026. Non permettere a una distrazione di costarti una carriera.</p>
                            <p style="margin-top:1rem; font-weight:800;">Recupera il gap ora, prima che sia troppo tardi:</p>
                            <a href="https://toscano334.gumroad.com/l/nhrfnx" class="btn-primary">ANALIZZA LE TRAPPOLE E VINCI ➔</a>
                        </div>`;
                } else {
                    document.getElementById('score-display').style.background = "var(--success)";
                    sc.innerHTML = `
                        <div class="sales-pitch" style="border-color:var(--success); background:#f0fdf4;">
                            <h3 style="color:var(--success);">✅ IDONEO: Ma basta per vincere?</h3>
                            <p>Ottimo risultato, ma ricorda: in graduatoria vince chi non sbaglia nulla. Gli altri restano idonei... ma disoccupati.</p>
                            <p style="margin-top:1rem;">Vuoi rischiare di finire dietro per mezzo punto o vuoi blindare la tua posizione?</p>
                            <a href="https://toscano334.gumroad.com/l/nhrfnx" class="btn-primary" style="background:var(--success)">ASSICURATI IL POSTO FISSO ➔</a>
                        </div>`;
                }
            }
        }
    </script>
</body>
</html>
