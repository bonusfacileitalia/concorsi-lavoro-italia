<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Quiz | Diritto Amministrativo 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7345740458390832" crossorigin="anonymous"></script>
    <style>
        :root { --primary-blue: #0A2540; --action-red: #D93025; --bg-light: #F6F9FC; --text-dark: #333333; --success: #10B981; --error: #EF4444; --card-bg: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--primary-blue); color: white; padding: 1.5rem 1rem; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { font-size: 1.8rem; font-weight: 800; }
        .quiz-container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; flex-grow: 1; width: 100%; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 2rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-weight: 600; }
        .timer { display: flex; align-items: center; gap: 0.5rem; background: #E2E8F0; padding: 0.5rem 1rem; border-radius: 20px; font-variant-numeric: tabular-nums; }
        .progress-bar { width: 100%; height: 10px; background: #E2E8F0; border-radius: 5px; margin-bottom: 2rem; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-blue); width: 0%; transition: width 0.3s ease; }
        .question-text { font-size: 1.3rem; font-weight: 800; margin-bottom: 1.5rem; line-height: 1.4; }
        .options-grid { display: grid; gap: 0.8rem; }
        .option-btn { background: var(--bg-light); border: 2px solid #E2E8F0; padding: 0.8rem 1rem; border-radius: 8px; font-size: 1rem; text-align: left; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .option-btn:hover:not(:disabled) { border-color: var(--primary-blue); background: #E2E8F0; }
        .option-btn.correct { background-color: #D1FAE5; border-color: var(--success); color: #065F46; }
        .option-btn.wrong { background-color: #FEE2E2; border-color: var(--error); color: #991B1B; }
        .feedback-box { margin-top: 1.2rem; padding: 1.2rem; border-radius: 8px; display: none; }
        .feedback-box.show { display: block; animation: slideDown 0.3s ease; }
        .btn-primary { background: var(--action-red); color: white; border: none; padding: 1rem; font-size: 1.2rem; font-weight: 800; border-radius: 8px; cursor: pointer; display: block; width: 100%; text-align: center; text-decoration: none; margin-top: 1.5rem; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; background: var(--primary-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; margin: 0 auto 1.5rem; }
        .sales-pitch { background: #FFF4F2; border: 2px solid var(--action-red); padding: 1.5rem; border-radius: 12px; margin: 1.5rem 0; text-align: left; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <header><h1>Simulatore Esame 2026</h1></header>
    <main class="quiz-container">
        <div id="start-screen" class="card" style="text-align: center;">
            <h2 style="margin-bottom: 1rem;">Test Diritto Amministrativo</h2>
            <p style="margin-bottom: 2rem; color: #666;">Database aggiornato: 66 domande. Il sistema ne estrarrà 13 casuali. Solo l'80% garantisce l'idoneità.</p>
            <button class="btn-primary" onclick="startQuiz()">INIZIA IL TEST ➔</button>
        </div>
        <div id="quiz-screen" class="card hidden">
            <div class="quiz-header"><span id="question-counter">Domanda 1/13</span><div class="timer">⏱️ <span id="time-display">00:00</span></div></div>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
            <h2 id="question-text" class="question-text"></h2>
            <div id="options-grid" class="options-grid"></div>
            <div id="feedback-box" class="feedback-box">
                <h4 id="feedback-title"></h4>
                <p id="feedback-text" style="font-size: 0.9rem; margin-top: 0.5rem;"></p>
            </div>
            <button id="next-btn" class="btn-primary" style="display:none; background: var(--primary-blue);" onclick="nextQuestion()">CONTINUA ➔</button>
        </div>
        <div id="result-screen" class="card hidden" style="text-align: center;">
            <h2>Esito Finale</h2>
            <p style="margin: 1rem 0; color: #666;">Tempo: <span id="final-time"></span></p>
            <div class="score-circle" id="score-display">0%</div>
            <div id="sales-container"></div>
            <button class="btn-primary" style="background-color: var(--primary-blue); margin-top: 1rem;" onclick="location.reload()">🔄 RIPETI IL QUIZ</button>
        </div>
    </main>

    <script>
        const databaseQuiz = [
            { q: "Termine generale conclusione procedimento (L. 241/90)?", a: "30 giorni", o: ["30 giorni", "60 giorni", "90 giorni", "120 giorni"], e: "Art. 2 L. 241/90." },
            { q: "Provvedimento adottato in violazione di legge è:", a: "Annullabile", o: ["Nullo", "Inesistente", "Annullabile", "Irregolare"], e: "Art. 21-octies L. 241/90." },
            { q: "Accesso civico generalizzato (FOIA) spetta a:", a: "Chiunque senza motivazione", o: ["Solo chi ha interesse diretto", "Chiunque senza motivazione", "Solo ai giornalisti", "Solo ai residenti"], e: "D.Lgs. 97/2016." },
            { q: "Giurisdizione responsabilità contabile dipendenti?", a: "Corte dei Conti", o: ["TAR", "Consiglio di Stato", "Corte dei Conti", "Cassazione"], e: "Art. 103 Cost." },
            { q: "Responsabile del Procedimento (Art. 5 L. 241/90):", a: "Valuta condizioni ammissibilità", o: ["Valuta condizioni ammissibilità", "È sempre il Sindaco", "Non ha poteri istruttori", "Decide solo i ricorsi"], e: "È il dominus dell'istruttoria." },
            { q: "Silenzio Assenso NON si applica a:", a: "Patrimonio culturale/paesaggio", o: ["Edilizia residenziale", "Patrimonio culturale/paesaggio", "Commercio", "Artigianato"], e: "Art. 20 L. 241/90." },
            { q: "Annullamento d'ufficio entro massimo (L. 108/21):", a: "12 mesi", o: ["6 mesi", "12 mesi", "24 mesi", "Senza limiti"], e: "Termine ridotto per certezza rapporti." },
            { q: "Principio cardine Nuovo Codice Appalti (36/23)?", a: "Risultato", o: ["Minor prezzo", "Risultato", "Rotazione rigida", "Pari opportunità"], e: "Art. 1 D.Lgs. 36/2023." },
            { q: "Discrezionalità tecnica implica:", a: "Valutazione fatti complessi", o: ["Scelta tra interessi", "Valutazione fatti complessi", "Decisione politica", "Potere di ordinanza"], e: "Applicazione scienze esatte." },
            { q: "Termine risposta accesso atti (L. 241/90)?", a: "30 giorni", o: ["15 giorni", "30 giorni", "60 giorni", "90 giorni"], e: "Dopo 30gg è silenzio-rigetto." },
            { q: "Giurisdizione dopo stipula contratto appalto?", a: "Giudice Ordinario", o: ["TAR", "Giudice Ordinario", "Corte dei Conti", "ANAC"], e: "Fase esecutiva = Diritto Privato." },
            { q: "Nullità provvedimento se manca:", a: "Elementi essenziali", o: ["Motivazione", "Elementi essenziali", "Comunicazione avvio", "Parere tecnico"], e: "Art. 21-septies L. 241/90." },
            { q: "SCIA: il terzo controinteressato può:", a: "Sollecitare poteri inibitori PA", o: ["Impugnare SCIA al TAR", "Sollecitare poteri inibitori PA", "Bloccare i lavori fisicamente", "Fare ricorso al Prefetto"], e: "La SCIA non è un atto impugnabile." },
            { q: "Avvalimento (Codice 36/23):", a: "Prestito requisiti da ausiliaria", o: ["Prestito requisiti da ausiliaria", "Vietato sempre", "Solo per imprese estere", "Non prevede solidarietà"], e: "Responsabilità in solido." },
            { q: "Piano Anticorruzione (PTPCT) adottato entro:", a: "31 Gennaio", o: ["31 Dicembre", "31 Gennaio", "30 Giugno", "Pasqua"], e: "Aggiornamento annuale obbligatorio." },
            { q: "Ricorso silenzio inadempimento entro max:", a: "1 anno", o: ["60 giorni", "120 giorni", "1 anno", "Mai"], e: "Dalla scadenza del termine proc." },
            { q: "Preavviso di rigetto (10-bis):", a: "Interrompe i termini", o: ["Annulla istanza", "Interrompe i termini", "È facoltativo", "Vale per concorsi"], e: "10 giorni per osservazioni." },
            { q: "Revoca provvedimento (21-quinquies) prevede:", a: "Indennizzo", o: ["Risarcimento", "Indennizzo", "Nullità", "Scuse scritte"], e: "Indennizzo per pregiudizi subiti." },
            { q: "Accordi PA-Privati (Art. 11):", a: "Atto scritto pena nullità", o: ["Solo verbali", "Atto scritto pena nullità", "Senza recesso PA", "Senza controllo Corte Conti"], e: "Forma scritta obbligatoria." },
            { q: "RUP nel nuovo codice (36/23) significa:", a: "Resp. Unico Progetto", o: ["Resp. Unico Procedimento", "Resp. Unico Progetto", "Resp. Unico Prezzo", "Resp. Unico Personale"], e: "Responsabilità su intero ciclo." },
            { q: "Soccorso istruttorio VIETATO per:", a: "Offerta tecnica/economica", o: ["Codice Fiscale errato", "Certificato scaduto", "Offerta tecnica/economica", "Firma mancante"], e: "Divieto di modifica offerta." },
            { q: "Licenziamento disciplinare competenza di:", a: "UPD", o: ["Dirigente ufficio", "UPD", "Ministro", "Giudice Lavoro"], e: "Ufficio Procedimenti Disciplinari." },
            { q: "Giurisdizione CONCORSI PUBBLICI?", a: "Giudice Amministrativo", o: ["Giudice del Lavoro", "Giudice Amministrativo", "TAR del Lazio sempre", "Giudice Pace"], e: "Fino alla graduatoria decide il TAR." },
            { q: "Whistleblower: il dipendente che segnala:", a: "Non può essere sanzionato", o: ["Viene licenziato", "Non può essere sanzionato", "Deve rivelare nome", "Riceve soldi"], e: "Tutela antiritorsiva." },
            { q: "Inconferibilità incarichi (D.Lgs. 39/13):", a: "Preclusione a monte nomina", o: ["Obbligo scelta", "Preclusione a monte nomina", "Divieto parenti", "Solo per comuni"], e: "Impedisce il conferimento." },
            { q: "Motivi aggiunti nel processo servono a:", a: "Nuovi vizi dopo documenti PA", o: ["Chiedere più soldi", "Nuovi vizi dopo documenti PA", "Cambiare avvocato", "Allungare tempi"], e: "Art. 43 CPA." },
            { q: "Giudizio Ottemperanza serve a:", a: "Eseguire sentenza non attuata", o: ["Chiedere sospensiva", "Eseguire sentenza non attuata", "Impugnare bando", "Denunciare dolo"], e: "Esecuzione forzata vs PA." },
            { q: "Art. 97 Cost. sancisce:", a: "Imparzialità e Buon andamento", o: ["Diritto al lavoro", "Imparzialità e Buon andamento", "Unità d'Italia", "Potere di veto"], e: "Pilastri dell'azione amministrativa." },
            { q: "Motivazione atto NON richiesta per:", a: "Atti normativi/generali", o: ["Diniego accesso", "Esproprio", "Atti normativi/generali", "Sanzioni"], e: "Art. 3 L. 241/90." },
            { q: "Consiglio di Stato è organo:", a: "Consultivo e Giurisdizionale", o: ["Solo d'appello", "Solo per pareri Governo", "Consultivo e Giurisdizionale", "Solo contabile"], e: "Organo rilievo costituzionale." },
            { q: "Sussidiarietà verticale (118 Cost):", a: "Funzioni prima ai Comuni", o: ["Tutto allo Stato", "Funzioni prima ai Comuni", "Solo alle Regioni", "Solo alle Prefetture"], e: "Ente più vicino al cittadino." },
            { q: "Beni demaniali sono:", a: "Inalienabili", o: ["Vendibili", "Inalienabili", "Usucapibili", "Privati"], e: "Lido, fiumi, fortezze." },
            { q: "Conferenza servizi decisoria di norma è:", a: "Semplificata/Asincrona", o: ["Sincrona/Fisica", "Semplificata/Asincrona", "Telefonica", "Segreta"], e: "Art. 14-bis L. 241/90." },
            { q: "Accesso Civico Semplice riguarda:", a: "Dati obbligatori non pubblicati", o: ["Segreti di stato", "Dati obbligatori non pubblicati", "Email private", "Multe"], e: "Violazione obbligo trasparenza." },
            { q: "ARAN rappresenta:", a: "Le PA nella contrattazione", o: ["I sindacati", "Le PA nella contrattazione", "Le Regioni al Sud", "I disoccupati"], e: "Rappresentanza legale PA." },
            { q: "Giurisdizione esclusiva GA:", a: "Interessi + Diritti soggettivi", o: ["Solo interessi", "Interessi + Diritti soggettivi", "Solo penale", "Multe stradali"], e: "Materie specifiche (es. edilizia)." },
            { q: "Limite subappalto (36/23):", a: "Non predeterminato per legge", o: ["Fisso 30%", "Fisso 49%", "Non predeterminato per legge", "Vietato sempre"], e: "Rimosso limite fisso UE." },
            { q: "Art. 28 Cost: responsabilità solidale:", a: "Dipendente + Stato", o: ["Solo dipendente", "Dipendente + Stato", "Solo Stato", "Nessuno"], e: "Cittadino può rivalersi su entrambi." },
            { q: "Eccesso di potere è vizio di:", a: "Legittimità", o: ["Merito", "Legittimità", "Nullità", "Inesistenza"], e: "Cattivo uso del potere." },
            { q: "Ricorso al TAR entro:", a: "60 giorni", o: ["30 giorni", "60 giorni", "90 giorni", "120 giorni"], e: "Termine perentorio annullamento." },
            { q: "Convalida atto annullabile (21-nonies):", a: "Sana atto retroattivamente", o: ["Lo distrugge", "Sana atto retroattivamente", "Vale per atti nulli", "Non richiede interesse"], e: "Riesame conservativo." },
            { q: "Opposizione controinteressati accesso:", a: "Entro 10 giorni", o: ["Entro 5 giorni", "Entro 10 giorni", "Entro 30 giorni", "Mai"], e: "Dalla comunicazione PA." },
            { q: "Ordinanze contingibili Sindaco:", a: "Possono derogare a leggi", o: ["Solo per multe", "Possono derogare a leggi", "Richiedono voto Consiglio", "Sono eterne"], e: "Nel rispetto dei princ. Cost." },
            { q: "Separazione politica/amministrazione:", a: "Politico dà indirizzo", o: ["Politico firma contratti", "Politico dà indirizzo", "Dirigente decide leggi", "Nessuna distinzione"], e: "D.Lgs. 165/01." },
            { q: "Affidamento diretto sotto 140k servizi:", a: "Possibile senza gara", o: ["Gara europea", "Possibile senza gara", "Solo con 10 preventivi", "Vietato"], e: "Codice 36/23 velocità." },
            { q: "Atto senza firma obbligatoria è:", a: "Nullo", o: ["Valido", "Annullabile", "Nullo", "Irregolare"], e: "Mancanza elemento essenziale." },
            { q: "Silenzio-Rigetto su accesso dopo:", a: "30 giorni", o: ["15 giorni", "30 giorni", "60 giorni", "90 giorni"], e: "L. 241/90." },
            { q: "ASL sono enti con:", a: "Autonomia imprenditoriale", o: ["Dipendenza da Prefetto", "Autonomia imprenditoriale", "Soli fini lucro", "Personalità privata"], e: "D.Lgs. 502/92." },
            { q: "Bando di gara è atto:", a: "Generale", o: ["Normativo", "Generale", "Soggettivo", "Parere"], e: "Destinatari determinabili dopo." },
            { q: "Dichiarazione Pubblica Utilità esproprio:", a: "Presupposto decreto esproprio", o: ["È l'atto finale", "Presupposto decreto esproprio", "Sostituisce il pagamento", "È facoltativa"], e: "Senza di essa esproprio è nullo." },
            { q: "Fumus boni iuris e Periculum in mora:", a: "Requisiti cautelare (sospensiva)", o: ["Prove penali", "Requisiti cautelare (sospensiva)", "Vizi di merito", "Solo per multe"], e: "Per ottenere la sospensiva." },
            { q: "Omessa pubblicazione dati obbligatori:", a: "Accesso civico semplice", o: ["Arresto sindaco", "Accesso civico semplice", "Multa 100k", "Denuncia ONU"], e: "D.Lgs. 33/13." },
            { q: "Controllo gestione valuta:", a: "Efficacia, Efficienza, Economicità", o: ["Solo legalità", "Efficacia, Efficienza, Economicità", "Presenze dipendenti", "Colore uffici"], e: "Ottimizzazione risultati." },
            { q: "Approvazione Bilancio Previsione Comune:", a: "Consiglio Comunale", o: ["Sindaco", "Giunta", "Consiglio Comunale", "Tesoriere"], e: "Art. 42 TUEL." },
            { q: "Segretario Comunale garantisce:", a: "Legalità e Assistenza giuridica", o: ["Ordine pubblico", "Legalità e Assistenza giuridica", "Voti elettorali", "Pulizia strade"], e: "Funzione rogatoria." },
            { q: "Performance Brunetta (150/09):", a: "Premia merito/obiettivi", o: ["Aumenti per tutti", "Premia merito/obiettivi", "Licenziamento donne", "Bonus vacanze"], e: "Contro premi a pioggia." },
            { q: "GA può risarcire danno da lesione?", a: "Sì, sempre", o: ["No mai", "Sì, sempre", "Solo sopra 1 milione", "Solo se lo dice il Papa"], e: "Art. 7 CPA." },
            { q: "Rotazione personale anticorruzione:", a: "Misura di prevenzione", o: ["Punizione", "Misura di prevenzione", "Solo per dirigenti", "Vietata"], e: "Evita rendite posizione." },
            { q: "Danno Erariale: elemento soggettivo:", a: "Dolo o Colpa Grave", o: ["Colpa lieve", "Dolo o Colpa Grave", "Sola negligenza", "Caso fortuito"], e: "Giurisprudenza contabile." },
            { q: "Causa esclusione automatica subappaltatore:", a: "Impone sostituzione", o: ["Esclude tutta l'impresa", "Impone sostituzione", "Non conta nulla", "Multa ANAC"], e: "Moralità della filiera." },
            { q: "DPO (Privacy) in PA è:", a: "Obbligatorio", o: ["Facoltativo", "Obbligatorio", "Solo per Comuni sopra 100k", "Solo per ospedali"], e: "Art. 37 GDPR." },
            { q: "Atto emanato dopo termine (tardivo):", a: "Valido ma fonte responsabilità", o: ["Nullo", "Valido ma fonte responsabilità", "Inesistente", "Illegittimo ex se"], e: "Dovere di provvedere." },
            { q: "Art. 113 Cost: contro atti PA:", a: "Sempre ammessa tutela", o: ["Tutela limitata", "Sempre ammessa tutela", "Solo per ricchi", "Solo per diritti"], e: "Sindacabilità universale." },
            { q: "Project Financing: rischio operativo a:", a: "Privato (Concessionario)", o: ["Stato", "Privato (Concessionario)", "Assicurazione", "BCE"], e: "Trasferimento del rischio." },
            { q: "Atto che elude il giudicato è:", a: "Nullo", o: ["Annullabile", "Valido", "Nullo", "Irregolare"], e: "Art. 21-septies L. 241/90." },
            { q: "Autotutela PA è potere:", a: "Discrezionale", o: ["Doveroso", "Discrezionale", "Vincolato", "Inesistente"], e: "Riesame dell'agire pubblico." }
        ];

        let quizSessione = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let timerInterval;
        let secondsElapsed = 0;

        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const questionText = document.getElementById('question-text');
        const optionsGrid = document.getElementById('options-grid');
        const nextBtn = document.getElementById('next-btn');
        const feedbackBox = document.getElementById('feedback-box');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');
        const progressFill = document.getElementById('progress-fill');
        const questionCounter = document.getElementById('question-counter');
        const timeDisplay = document.getElementById('time-display');

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function startQuiz() {
            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            quizSessione = shuffle([...databaseQuiz]).slice(0, 13);
            score = 0; currentQuestionIndex = 0; secondsElapsed = 0;
            timerInterval = setInterval(() => {
                secondsElapsed++;
                const mins = String(Math.floor(secondsElapsed/60)).padStart(2,'0');
                const secs = String(secondsElapsed%60).padStart(2,'0');
                timeDisplay.innerText = `${mins}:${secs}`;
            }, 1000);
            loadQuestion();
        }

        function loadQuestion() {
            nextBtn.style.display = 'none';
            feedbackBox.className = 'feedback-box';
            optionsGrid.innerHTML = '';
            const q = quizSessione[currentQuestionIndex];
            questionText.innerText = q.q;
            questionCounter.innerText = `Domanda ${currentQuestionIndex + 1}/13`;
            progressFill.style.width = `${(currentQuestionIndex/13)*100}%`;
            
            shuffle([...q.o]).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    const all = optionsGrid.querySelectorAll('.option-btn');
                    all.forEach(b => b.disabled = true);
                    if(opt === q.a) { btn.classList.add('correct'); score++; feedbackTitle.innerText="✅ ESATTO"; feedbackBox.classList.add('success'); }
                    else { btn.classList.add('wrong'); feedbackTitle.innerText="❌ SBAGLIATO"; feedbackBox.classList.add('error'); }
                    feedbackText.innerText = q.e;
                    feedbackBox.classList.add('show');
                    nextBtn.style.display = 'block';
                };
                optionsGrid.appendChild(btn);
            });
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if(currentQuestionIndex < 13) loadQuestion();
            else {
                clearInterval(timerInterval);
                quizScreen.classList.add('hidden');
                resultScreen.classList.remove('hidden');
                const perc = Math.round((score/13)*100);
                document.getElementById('score-display').innerText = perc + "%";
                document.getElementById('final-time').innerText = timeDisplay.innerText;
                const sc = document.getElementById('sales-container');
                if(perc < 80) {
                    document.getElementById('score-display').style.background = "var(--action-red)";
                    sc.innerHTML = `<div class="sales-pitch"><h3>⚠️ FALLITO: Preparazione insufficiente</h3><p>Con questo punteggio verresti scartato immediatamente. Le lacune in Diritto Amministrativo sono letali nei concorsi 2026.</p><p style="margin-top:1rem; font-weight:800;">RECUPERA ORA CON LE MAPPE MENTALI AGGIORNATE:</p><a href="https://toscano334.gumroad.com/l/nhrfnx" class="btn-primary">SCARICA IL MANUALE SALVA-CONCORSO (15€) ➔</a></div>`;
                } else {
