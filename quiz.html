<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --success: #27ae60; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* HOME PAGE */
        #home-page { text-align: center; background: var(--white); padding: 50px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 600px; width: 90%; }
        h1 { color: var(--primary); font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #7f8c8d; margin-bottom: 30px; font-size: 1.1em; }
        .progress-card { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #eee; }
        .progress-number { font-size: 2em; font-weight: bold; color: var(--primary); }
        .btn-start { background: var(--primary); color: white; border: none; padding: 18px 40px; border-radius: 50px; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: transform 0.2s, background 0.3s; }
        .btn-start:hover { background: #1a252f; transform: scale(1.05); }

        /* QUIZ CONTAINER (Nascosto all'inizio) */
        #quiz-container { display: none; background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 800px; width: 100%; margin: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--bg); padding-bottom: 15px; }
        .materia-tag { background: var(--primary); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.75em; text-transform: uppercase; }
        .question { font-size: 1.15em; margin-bottom: 25px; line-height: 1.6; font-weight: 600; }
        .options { display: grid; gap: 12px; }
        .option { padding: 15px; border: 2px solid var(--bg); border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 0.95em; }
        .option:hover { border-color: #3498db; background: #f8fbff; }
        .option.correct { background: var(--success) !important; color: white; }
        .option.wrong { background: var(--accent) !important; color: white; }
        .explanation { margin-top: 25px; padding: 18px; background: #eef7ff; border-left: 5px solid #3498db; display: none; border-radius: 0 8px 8px 0; }
        .btn-next { margin-top: 25px; width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1em; font-weight: bold; display: none; }
    </style>
</head>
<body>

<!-- HOME PAGE -->
<div id="home-page">
    <h1>Socio, benvenuto.</h1>
    <p class="subtitle">Il tuo arsenale di 601 domande per schiantare i concorsi 2026.</p>
    
    <div class="progress-card">
        <div class="progress-number"><span id="home-counter">0</span> / 601</div>
        <p>Domande completate nel tuo percorso</p>
    </div>

    <button class="btn-start" onclick="iniziaQuiz()">ENTRA IN ARENA</button>
</div>

<!-- QUIZ CONTAINER -->
<div id="quiz-container">
    <div class="header">
        <span id="materia-label" class="materia-tag">Caricamento...</span>
        <span style="font-size: 0.9em; font-weight: bold;">Quesito n. <span id="counter">0</span></span>
    </div>
    
    <div class="question" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <div class="explanation" id="explanation-box"></div>
    <button class="btn-next" id="next-btn" onclick="prossimaDomanda()">PROSSIMA DOMANDA →</button>
</div>

const STORAGE_KEY = 'concorso_progres_2026';
let domandeViste = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let bufferMaterie = [];
let domandaCorrente = null;

// Sincronizza il contatore nella Home
document.getElementById('home-counter').innerText = domandeViste.length;

function iniziaQuiz() {
    document.getElementById('home-page').style.display = 'none';
    document.getElementById('quiz-container').style.display = 'block';
    caricaDomanda();
}

function inizializzaMaterie() {
    databaseQuiz.forEach((q, i) => {
        if (!q.materia) {
            if (i < 100) q.materia = "Diritto Amministrativo";
            else if (i < 200) q.materia = "TUEL";
            else if (i < 300) q.materia = "Codice Appalti";
            else if (i < 400) q.materia = "Pubblico Impiego";
            else if (i < 500) q.materia = "Fiscalità & UE";
            else q.materia = "Logica & Attualità";
        }
    });
}

function estraiDomanda() {
    if (domandeViste.length >= databaseQuiz.length) {
        alert("🎉 HAI FINITO TUTTO! Reset in corso...");
        domandeViste = [];
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
        return;
    }

    let poolDisponibili = databaseQuiz.filter((_, index) => !domandeViste.includes(index));
    let poolFiltrato = poolDisponibili.filter(q => !bufferMaterie.includes(q.materia));
    let candidati = poolFiltrato.length > 0 ? poolFiltrato : poolDisponibili;

    const scelta = candidati[Math.floor(Math.random() * candidati.length)];
    const indiceOriginale = databaseQuiz.indexOf(scelta);

    domandeViste.push(indiceOriginale);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(domandeViste));

    bufferMaterie.push(scelta.materia);
    if (bufferMaterie.length > 3) bufferMaterie.shift();

    return scelta;
}

function caricaDomanda() {
    domandaCorrente = estraiDomanda();
    if (!domandaCorrente) return;

    document.getElementById('explanation-box').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('counter').innerText = domandeViste.length;
    document.getElementById('materia-label').innerText = domandaCorrente.materia;
    document.getElementById('question-text').innerText = domandaCorrente.q;
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';

    domandaCorrente.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerText = opt;
        div.onclick = () => controllaRisposta(i, div);
        container.appendChild(div);
    });
}

function controllaRisposta(index, element) {
    const opzioni = document.querySelectorAll('.option');
    opzioni.forEach(o => o.onclick = null);

    if (index === domandaCorrente.a) {
        element.classList.add('correct');
    } else {
        element.classList.add('wrong');
        opzioni[domandaCorrente.a].classList.add('correct');
    }

    const expBox = document.getElementById('explanation-box');
    expBox.innerHTML = `<strong>Spiegazione:</strong> ${domandaCorrente.e}`;
    expBox.style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
}

function prossimaDomanda() {
    caricaDomanda();
}

inizializzaMaterie();
