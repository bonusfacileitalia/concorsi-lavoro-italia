<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Concorsi 2026 - Versione Elite</title>
    <style>
        :root { --primary: #1a252f; --accent: #2980b9; --success: #27ae60; --danger: #c0392b; --bg: #050505; --card: #111; --text: #e0e0e0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px 0; }
        #home-page { text-align: center; background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid #222; max-width: 600px; width: 90%; }
        h1 { color: #fff; font-size: 2.2em; text-transform: uppercase; font-weight: 800; margin-bottom: 10px; }
        .stat-val { font-size: 2.2em; font-weight: 900; color: var(--accent); margin-bottom: 20px; }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .btn-start { background: linear-gradient(135deg, #2980b9, #2c3e50); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.3s; }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(41,128,185,0.4); }
        .btn-exam { background: linear-gradient(135deg, #c0392b, #8e44ad); }
        #quiz-container { display: none; background: var(--card); padding: 40px; border-radius: 16px; max-width: 850px; width: 95%; border: 1px solid #222; }
        .timer { font-family: monospace; font-size: 1.6em; color: #fff; background: #1a1a1a; padding: 5px 15px; border-radius: 6px; border: 1px solid #333; }
        .materia-tag { color: var(--accent); font-size: 0.75em; text-transform: uppercase; font-weight: 800; margin-bottom: 15px; display: inline-block; padding: 4px 10px; background: rgba(41, 128, 185, 0.1); border-radius: 4px; }
        .question { font-size: 1.25em; margin-bottom: 30px; line-height: 1.6; color: #fff; }
        .option { padding: 18px 20px; background: #161616; border: 1px solid #333; border-radius: 8px; cursor: pointer; margin-bottom: 10px; font-size: 0.95em; color: #bbb; transition: 0.2s; }
        .option:hover { background: #1c1c1c; border-color: #555; color: #fff; }
        .option.correct { background: rgba(39, 174, 96, 0.1) !important; border-color: var(--success) !important; color: #fff !important; }
        .option.wrong { background: rgba(192, 57, 43, 0.1) !important; border-color: var(--danger) !important; color: #fff !important; }
        .explanation { margin-top: 20px; padding: 20px; background: #111; border-left: 4px solid var(--accent); display: none; color: #aaa; font-size: 0.9em; line-height: 1.6; }
        .btn-next { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 700; display: none; cursor: pointer; text-transform: uppercase; }
        .btn-manual { display: block; margin-top: 20px; color: var(--accent); text-decoration: none; font-size: 0.8em; font-weight: 700; text-transform: uppercase; border: 1px solid var(--accent); padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

<div id="home-page">
    <h1>Centrale Concorsi</h1>
    <p>Simulatore RIPAM 2026 - Analisi Normativa</p>
    <div class="stat-val" id="db-total">50</div>
    <div class="mode-grid">
        <button class="btn-start" onclick="preparaSessione(25, 25, false)">Test Sprint (25Q)</button>
        <button class="btn-start btn-exam" onclick="preparaSessione(50, 50, true)">Esame Full (50Q)</button>
    </div>
    <a href="https://toscano334.gumroad.com/l/nhrfnx" target="_blank" class="btn-manual">Acquisisci il Manuale Tecnico</a>
</div>

<div id="quiz-container">

        <div class="timer" id="timer">00:00</div>
    </div>
    <span id="materia-label" class="materia-tag"></span>
    <div class="question" id="question-text"></div>
    <div id="options-container"></div>
    <div class="explanation" id="explanation-box"></div>
    <button class="btn-next" id="next-btn" onclick="prossimaDomanda()">Conferma Risposta</button>
</div>

const STORAGE_KEY = 'concorso_progres_v4';
const SESSION_KEY = 'concorso_active_session_v4';

let sessionPool = [];
let sessionIdx = 0;
let sessionAnswers = [];
let timeLeft = 0;
let MAX_TIME_SECONDS = 0;
let timerInterval;
let isExamMode = false;

document.getElementById('db-total').innerText = databaseQuiz.length;

function preparaSessione(num, min, exam) {
    isExamMode = exam;
    sessionPool = databaseQuiz.map((_, i) => i).sort(() => Math.random() - 0.5).slice(0, num);
    sessionIdx = 0;
    sessionAnswers = [];
    MAX_TIME_SECONDS = min * 60;
    timeLeft = MAX_TIME_SECONDS;
    
    document.getElementById('home-page').style.display = 'none';
    document.getElementById('quiz-container').style.display = 'block';
    document.getElementById('total-q-count').innerText = num;
    
    startTimer();
    caricaDomanda();
}

function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        if(timeLeft <= 0) { clearInterval(timerInterval); fineSessione("TEMPO SCADUTO"); }
    }, 1000);
}

function caricaDomanda() {
    let qIdx = sessionPool[sessionIdx];
    let q = databaseQuiz[qIdx];
    document.getElementById('current-q-idx').innerText = sessionIdx + 1;
    document.getElementById('materia-label').innerText = q.materia;
    document.getElementById('question-text').innerText = q.q;
    document.getElementById('explanation-box').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    let cont = document.getElementById('options-container');
    cont.innerHTML = '';
    
    q.options.forEach((opt, i) => {
        let div = document.createElement('div');
        div.className = 'option';
        div.innerText = opt;
        div.onclick = () => {
            document.querySelectorAll('.option').forEach(o => o.onclick = null);
            let isCorrect = (i === q.a);
            sessionAnswers[sessionIdx] = isCorrect;
            if(isCorrect) div.classList.add('correct');
            else { div.classList.add('wrong'); cont.children[q.a].classList.add('correct'); }
            document.getElementById('explanation-box').innerText = q.e;
            document.getElementById('explanation-box').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        };
        cont.appendChild(div);
    });
}

function prossimaDomanda() {
    sessionIdx++;
    if(sessionIdx < sessionPool.length) caricaDomanda();
    else fineSessione("COMPLETATO");
}

function fineSessione(reason) {
    clearInterval(timerInterval);
    let esatte = sessionAnswers.filter(a => a === true).length;
    let perc = ((esatte / sessionPool.length) * 100).toFixed(1);
    let idoneo = perc >= 85;
    
    document.getElementById('quiz-container').innerHTML = `
        <h2 style="color:${idoneo ? '#27ae60' : '#c0392b'}">${idoneo ? 'IDONEO' : 'NON IDONEO'}</h2>
        <p>Punteggio: ${esatte}/${sessionPool.length} (${perc}%)</p>
        <p>Soglia minima: 85%</p>
        <button class="btn-start" onclick="location.reload()">Torna alla Home</button>
    `;
}
