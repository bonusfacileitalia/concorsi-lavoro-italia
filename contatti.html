<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatti | Concorsi & Lavoro Italia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-blue: #0A2540; --bg-light: #F6F9FC; --text-dark: #333333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); line-height: 1.6; }
        header { background-color: var(--primary-blue); color: white; padding: 2rem 1rem; text-align: center; }
        .container { max-width: 800px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        h1, h2 { margin-bottom: 1rem; color: var(--primary-blue); }
        p { margin-bottom: 1rem; font-size: 1.1rem; }
        .email { font-size: 1.3rem; font-weight: 800; color: #D93025; margin: 2rem 0; }
        .btn-back { display: inline-block; margin-top: 1rem; padding: 0.5rem 1rem; background: #e2e8f0; text-decoration: none; border-radius: 5px; color: #333; }
    </style>
</head>
<body>
    <header><h1>Contattaci</h1></header>
    <div class="container">
        <h2>Hai domande sui bandi o segnalazioni?</h2>
        <p>Il nostro team è a disposizione per chiarimenti. Per richieste commerciali o segnalazioni riguardanti i contenuti, scrivici all'indirizzo email qui sotto:</p>
        <div class="email">bonusfacileitalia@gmail.com</div>
        <a href="index.html" class="btn-back">⬅ Torna alla Home</a>
    </div>
</body>
</html>
